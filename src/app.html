<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#7B4F8A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" />
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" />
    %sveltekit.head%
  </head>
  <body class="h-full" data-sveltekit-preload-data="hover">
    <script>
      try {
        const t = localStorage.getItem('shelf-theme');
        if (t === 'dark') document.documentElement.classList.add('dark');
        const c = localStorage.getItem('shelf-primary-color');
        const s = localStorage.getItem('shelf-sidebar-bg');
        if (c) document.documentElement.style.setProperty('--primary', c);
        if (s) document.documentElement.style.setProperty('--sidebar-bg', s);
      } catch(e) {}
      document.documentElement.classList.add('theme-loaded');
    </script>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
