# ── HTTPS production config ───────────────────────────────────────────────────
# Prerequisites:
#   1. Run certbot first (see DEPLOYMENT.md step 11)
#   2. Rename this file to shelf.conf  (overwriting the HTTP-only version)
#   3. docker compose exec nginx nginx -s reload

server {
    listen 80;
    server_name theflippantfoxpos.duckdns.org;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2  on;
    server_name theflippantfoxpos.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/theflippantfoxpos.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/theflippantfoxpos.duckdns.org/privkey.pem;
    ssl_session_timeout  1d;
    ssl_session_cache    shared:SSL:10m;
    ssl_session_tickets  off;
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Uncomment once you've confirmed SSL works correctly:
    # add_header Strict-Transport-Security "max-age=15768000" always;

    client_max_body_size 50M;

    location /directus/ {
        proxy_pass         http://directus:8055/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 3600s;
        proxy_buffer_size  128k;
        proxy_buffers      4 256k;
    }

    location / {
        proxy_pass         http://shelf:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
    }
}
