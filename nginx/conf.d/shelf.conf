# ── HTTP only — used until SSL certificates are obtained ──────────────────────
# After running certbot (see DEPLOYMENT.md step 11), replace this file with
# shelf-ssl.conf (rename it) and reload nginx.

server {
    listen 80;
    server_name theflippantfoxpos.duckdns.org;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy everything to the SvelteKit app (HTTP during setup)
    location /directus/ {
        proxy_pass         http://directus:8055/;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        proxy_pass         http://shelf:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade         $http_upgrade;
        proxy_set_header   Connection      "upgrade";
    }
}
